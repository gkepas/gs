<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Greaseshield GS2000-DPF AR</title>
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
<style>body{margin:0,font-family:system-ui,sans-serif}model-viewer{width:100vw;height:100vh;background:#fff}</style>
</head>
<body>
<model-viewer src="greaseshield.glb" ar ar-modes="scene-viewer webxr" ar-scale="fixed" camera-controls tone-mapping="neutral" shadow-intensity="1">
    <div class="progress-bar hide" slot="progress-bar">
        <div class="update-bar"></div>
    </div>
    <button slot="ar-button" id="ar-button">
        View in your space
    </button>
    <div id="ar-prompt">
        <img src="https://modelviewer.dev/shared-assets/icons/hand.png">
    </div>
</model-viewer>
</body>
</html>
